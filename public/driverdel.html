    // 🔸 Render driver table
    window.renderTable = function () {
      const tbody = document.getElementById("driverTableBody");
      tbody.innerHTML = "";
      let count = 0;
      const q = document.getElementById("searchInput").value.trim().toLowerCase();

      for (const id in allDrivers) {
        const d = allDrivers[id];
        if (!d) continue;

        // search filter
        if (q && !((d.name||"").toLowerCase().includes(q) || (d.gmail||"").toLowerCase().includes(q) || (d.mobile||"").includes(q)))
          continue;

        count++;
        const tr = document.createElement("tr");
        tr.className = d.online ? "onlineRow" : "offlineRow";

        const rider1 = d.rider1_id || "-";
        const rider2 = d.rider2_id || "-";
        const code1 = d.booking1_code || "-";
        const code2 = d.booking2_code || "-";

        tr.innerHTML = `
          <td>${d.name || "-"}</td>
          <td>${d.gmail || "-"}</td>
          <td>${d.mobile || "-"}</td>
          <td>${d.online ? "🟢 Online" : "🔴 Offline"}</td>
          <td>
            <div>👤 Rider1: ${rider1}</div>
            <div>Code: ${code1}</div>
            <hr>
            <div>👤 Rider2: ${rider2}</div>
            <div>Code: ${code2}</div>
          </td>
          <td>
            <button class="viewMapBtn" data-id="${id}">🗺️ View Map</button>
            <button class="deleteBtn" data-id="${id}">🗑️ Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }

      document.getElementById("driverCount").innerText = count;

      // 🔸 Attach Delete Button Functionality
      document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.target.dataset.id;

          const code = prompt("🔐 Enter admin code to delete this driver:");
          if (code !== "Chintu@Admin2025") {
            alert("❌ Invalid code. You are not authorized to delete this driver.");
            return;
          }

          if (!confirm("⚠️ Are you sure you want to delete this driver?")) return;

          try {
            await remove(ref(db, "drivers/" + id));
            alert("✅ Driver deleted successfully!");
          } catch (error) {
            console.error(error);
            alert("⚠️ Failed to delete driver. Check console for details.");
          }
        };
      });

      // 🔸 Attach View Map Button Functionality
      document.querySelectorAll(".viewMapBtn").forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.dataset.id;
          await openDriverMap(id);
        };
      });
    };

// ✅ Real-time driver map with satellite toggle + auto route refresh
async function openDriverMap(driverId) {
  const popup = document.getElementById("mapPopup");
  popup.style.display = "flex";
  const mapEl = document.getElementById("mapCanvas");
  mapEl.innerHTML = "";

  const snap = await get(ref(db, "drivers/" + driverId));
  if (!snap.exists()) { alert("Driver not found"); return; }
  let driver = snap.val();

  if (!driver.lat || !driver.lng) {
    alert("Driver has no location data.");
    return;
  }

  // Initialize map (satellite view default)
  const map = new google.maps.Map(mapEl, {
    center: { lat: Number(driver.lat), lng: Number(driver.lng) },
    zoom: 14,
    mapTypeId: "hybrid",
    streetViewControl: false,
    fullscreenControl: true,
  });

  // 🔸 Add Satellite / Roadmap toggle
  const toggleBtn = document.createElement("button");
  toggleBtn.textContent = "Switch View";
  toggleBtn.style.cssText =
    "position:absolute;top:10px;left:10px;padding:8px 12px;background:#fff;border:1px solid #ccc;border-radius:8px;cursor:pointer;";
  toggleBtn.onclick = () =>
    map.setMapTypeId(map.getMapTypeId() === "roadmap" ? "hybrid" : "roadmap");
  map.controls[google.maps.ControlPosition.TOP_LEFT].push(toggleBtn);

  const driverMarker = new google.maps.Marker({
    position: { lat: Number(driver.lat), lng: Number(driver.lng) },
    map,
    title: driver.name || "Driver",
    icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
  });

  const riderPoints = [];
  if (driver.rider1_lat && driver.rider1_lng)
    riderPoints.push({ lat: +driver.rider1_lat, lng: +driver.rider1_lng, label: "Rider 1" });
  if (driver.rider2_lat && driver.rider2_lng)
    riderPoints.push({ lat: +driver.rider2_lat, lng: +driver.rider2_lng, label: "Rider 2" });

  riderPoints.forEach((rp) =>
    new google.maps.Marker({
      position: rp,
      map,
      title: rp.label,
      icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
    })
  );

  const directionsService = new google.maps.DirectionsService();
  let activePolylines = [];

  // 🔸 Function to draw routes with animation
  async function drawRoutes(fromPos) {
    activePolylines.forEach((p) => p.setMap(null));
    activePolylines = [];

    for (let i = 0; i < riderPoints.length; i++) {
      const rp = riderPoints[i];
      try {
        const res = await directionsService.route({
          origin: fromPos,
          destination: rp,
          travelMode: google.maps.TravelMode.DRIVING,
        });

        const route = res.routes[0].overview_path;
        const polyline = new google.maps.Polyline({
          path: [],
          strokeColor: i === 0 ? "#0078ff" : "#ff4081",
          strokeOpacity: 0.9,
          strokeWeight: 5,
          map,
        });
        activePolylines.push(polyline);

        let step = 0;
        const animate = () => {
          if (step < route.length) {
            polyline.getPath().push(route[step]);
            step++;
            requestAnimationFrame(animate);
          }
        };
        animate();
      } catch (err) {
        console.error("Route draw error:", err);
      }
    }
  }

  await drawRoutes({ lat: +driver.lat, lng: +driver.lng });

  const bounds = new google.maps.LatLngBounds();
  bounds.extend(driverMarker.getPosition());
  riderPoints.forEach((rp) => bounds.extend(rp));
  map.fitBounds(bounds);

  let lastPos = { lat: +driver.lat, lng: +driver.lng };

  // =====================================================
  // ⭐⭐ UBER-STYLE BEZIER CURVED SMOOTH MARKER MOVEMENT
  // =====================================================

  // Generate curved point between start & end
  // Generate a smooth bezier point between start & end
function bezierPoint(start, end, t) {
  // ensure start/end are LatLng objects
  const sLat = start.lat instanceof Function ? start.lat() : start.lat;
  const sLng = start.lng instanceof Function ? start.lng() : start.lng;
  const eLat = end.lat instanceof Function ? end.lat() : end.lat;
  const eLng = end.lng instanceof Function ? end.lng() : end.lng;

  // single control point in the middle, slightly offset for curve
  const cp = {
    lat: (sLat + eLat) / 2 + 0.0002, // small fixed offset
    lng: (sLng + eLng) / 2 + 0.0002,
  };

  const lat = (1 - t) ** 2 * sLat + 2 * (1 - t) * t * cp.lat + t ** 2 * eLat;
  const lng = (1 - t) ** 2 * sLng + 2 * (1 - t) * t * cp.lng + t ** 2 * eLng;

  return { lat, lng };
}


  // Animate marker nicely
  function animateMarker(startPos, endPos, duration = 3000) {
    const startTime = performance.now();

    function frame(now) {
      const t = Math.min((now - startTime) / duration, 1);

      // Ease-in-out
      const eased = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

      const pos = bezierPoint(startPos, endPos, eased);
      driverMarker.setPosition(pos);

      if (t < 1) requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  }

  // =====================================================


  // 🔸 Real-time Firebase listener for live updates
  const driverRef = ref(db, "drivers/" + driverId);
  onValue(driverRef, async (snap) => {
    if (!snap.exists()) return;
    const updated = snap.val();
    if (!updated.lat || !updated.lng) return;

    const newPos = { lat: +updated.lat, lng: +updated.lng };

    // Use Uber-style animation
    animateMarker(
      driverMarker.getPosition(),
      new google.maps.LatLng(newPos.lat, newPos.lng)
    );

    const distance = haversineDistance(lastPos, newPos);
    if (distance > 0.1) {
      lastPos = newPos;
      await drawRoutes(newPos);
    }
  });

  function haversineDistance(p1, p2) {
    const R = 6371;
    const dLat = ((p2.lat - p1.lat) * Math.PI) / 180;
    const dLng = ((p2.lng - p1.lng) * Math.PI) / 180;
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos((p1.lat * Math.PI) / 180) *
        Math.cos((p2.lat * Math.PI) / 180) *
        Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }
}


    // 🔸 Close map popup
    window.closeMapPopup = function () {
      const popup = document.getElementById("mapPopup");
      if (!popup) return;
      const data = popup._mapObjects;
      if (data) {
        if (data.markers) data.markers.forEach(m => m.setMap(null));
        if (data.renderers) data.renderers.forEach(r => r.setMap && r.setMap(null));
        popup._mapObjects = null;
      }
      popup.style.display = "none";
    };
