<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel — Drivers with Directions</title>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // 🔹 Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyARe_cDs_WHl7CkCJTjCEaTMFAksmi1SXg",
      authDomain: "maps-41eca.firebaseapp.com",
      databaseURL: "https://maps-41eca-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "maps-41eca",
      storageBucket: "maps-41eca.firebasestorage.app",
      messagingSenderId: "850870521671",
      appId: "1:850870521671:web:6a986f4f81a6cb976b8662",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Global variable for all drivers
    let allDrivers = {};

    // 🔸 Listen for driver data
    onValue(ref(db, "drivers"), snapshot => {
      allDrivers = snapshot.exists() ? snapshot.val() : {};
      renderTable();
    });

    // 🔸 Render driver table
    window.renderTable = function () {
      const tbody = document.getElementById("driverTableBody");
      tbody.innerHTML = "";
      let count = 0;
      const q = document.getElementById("searchInput").value.trim().toLowerCase();

      for (const id in allDrivers) {
        const d = allDrivers[id];
        if (!d) continue;

        // search filter
        if (q && !((d.name||"").toLowerCase().includes(q) || (d.gmail||"").toLowerCase().includes(q) || (d.mobile||"").includes(q)))
          continue;

        count++;
        const tr = document.createElement("tr");
        tr.className = d.online ? "onlineRow" : "offlineRow";

        const rider1 = d.rider1_id || "-";
        const rider2 = d.rider2_id || "-";
        const code1 = d.booking1_code || "-";
        const code2 = d.booking2_code || "-";

        tr.innerHTML = `
          <td>${d.name || "-"}</td>
          <td>${d.gmail || "-"}</td>
          <td>${d.mobile || "-"}</td>
          <td>${d.online ? "🟢 Online" : "🔴 Offline"}</td>
          <td>
            <div>👤 Rider1: ${rider1}</div>
            <div>Code: ${code1}</div>
            <hr>
            <div>👤 Rider2: ${rider2}</div>
            <div>Code: ${code2}</div>
          </td>
          <td>
            <button class="viewMapBtn" data-id="${id}">🗺️ View Map</button>
            <button class="deleteBtn" data-id="${id}">🗑️ Delete</button>
          </td>
        `;
        tbody.appendChild(tr);
      }

      document.getElementById("driverCount").innerText = count;

      // 🔸 Attach Delete Button Functionality
      document.querySelectorAll(".deleteBtn").forEach(btn => {
        btn.onclick = async (e) => {
          const id = e.target.dataset.id;

          const code = prompt("🔐 Enter admin code to delete this driver:");
          if (code !== "Chintu@Admin2025") {
            alert("❌ Invalid code. You are not authorized to delete this driver.");
            return;
          }

          if (!confirm("⚠️ Are you sure you want to delete this driver?")) return;

          try {
            await remove(ref(db, "drivers/" + id));
            alert("✅ Driver deleted successfully!");
          } catch (error) {
            console.error(error);
            alert("⚠️ Failed to delete driver. Check console for details.");
          }
        };
      });

      // 🔸 Attach View Map Button Functionality
      document.querySelectorAll(".viewMapBtn").forEach(btn => {
        btn.onclick = async (e) => {
          const id = btn.dataset.id;
          await openDriverMap(id);
        };
      });
    };

   // ✅ Real-time driver map with satellite toggle + auto route refresh
async function openDriverMap(driverId) {
  const popup = document.getElementById("mapPopup");
  popup.style.display = "flex";
  const mapEl = document.getElementById("mapCanvas");
  mapEl.innerHTML = "";

  const snap = await get(ref(db, "drivers/" + driverId));
  if (!snap.exists()) { alert("Driver not found"); return; }
  let driver = snap.val();

  if (!driver.lat || !driver.lng) {
    alert("Driver has no location data.");
    return;
  }

  // Initialize map (satellite view default)
  const map = new google.maps.Map(mapEl, {
    center: { lat: Number(driver.lat), lng: Number(driver.lng) },
    zoom: 14,
    mapTypeId: "hybrid", // hybrid = satellite + labels
    streetViewControl: false,
    fullscreenControl: true,
  });

  // 🔸 Add Satellite / Roadmap toggle
  const toggleBtn = document.createElement("button");
  toggleBtn.textContent = "Switch View";
  toggleBtn.style.cssText =
    "position:absolute;top:10px;left:10px;padding:8px 12px;background:#fff;border:1px solid #ccc;border-radius:8px;cursor:pointer;";
  toggleBtn.onclick = () =>
    map.setMapTypeId(map.getMapTypeId() === "roadmap" ? "hybrid" : "roadmap");
  map.controls[google.maps.ControlPosition.TOP_LEFT].push(toggleBtn);

  const driverMarker = new google.maps.Marker({
    position: { lat: Number(driver.lat), lng: Number(driver.lng) },
    map,
    title: driver.name || "Driver",
    icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png",
  });

  const riderPoints = [];
  if (driver.rider1_lat && driver.rider1_lng)
    riderPoints.push({ lat: +driver.rider1_lat, lng: +driver.rider1_lng, label: "Rider 1" });
  if (driver.rider2_lat && driver.rider2_lng)
    riderPoints.push({ lat: +driver.rider2_lat, lng: +driver.rider2_lng, label: "Rider 2" });

  riderPoints.forEach((rp) =>
    new google.maps.Marker({
      position: rp,
      map,
      title: rp.label,
      icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png",
    })
  );

  const directionsService = new google.maps.DirectionsService();
  let activePolylines = [];

  // 🔸 Function to draw route with animation
  async function drawRoutes(fromPos) {
    // Clear previous lines
    activePolylines.forEach((p) => p.setMap(null));
    activePolylines = [];

    for (let i = 0; i < riderPoints.length; i++) {
      const rp = riderPoints[i];
      try {
        const res = await directionsService.route({
          origin: fromPos,
          destination: rp,
          travelMode: google.maps.TravelMode.DRIVING,
        });

        const route = res.routes[0].overview_path;
        const polyline = new google.maps.Polyline({
          path: [],
          strokeColor: i === 0 ? "#0078ff" : "#ff4081",
          strokeOpacity: 0.9,
          strokeWeight: 5,
          map,
        });
        activePolylines.push(polyline);

        let step = 0;
        const animate = () => {
          if (step < route.length) {
            polyline.getPath().push(route[step]);
            step++;
            requestAnimationFrame(animate);
          }
        };
        animate();
      } catch (err) {
        console.error("Route draw error:", err);
      }
    }
  }

  // Draw initial routes
  await drawRoutes({ lat: +driver.lat, lng: +driver.lng });

  // Fit all markers
  const bounds = new google.maps.LatLngBounds();
  bounds.extend(driverMarker.getPosition());
  riderPoints.forEach((rp) => bounds.extend(rp));
  map.fitBounds(bounds);

  // 🔸 Track last driver position to detect large moves
  let lastPos = { lat: +driver.lat, lng: +driver.lng };

  // 🔸 Real-time Firebase listener for live updates
  const driverRef = ref(db, "drivers/" + driverId);
  onValue(driverRef, async (snap) => {
    if (!snap.exists()) return;
    const updated = snap.val();
    if (!updated.lat || !updated.lng) return;

    const newPos = { lat: +updated.lat, lng: +updated.lng };

    // Smooth marker motion
    const start = driverMarker.getPosition();
    let progress = 0;
    const smoothMove = () => {
      progress += 0.05;
      if (progress <= 1) {
        const lat = start.lat() + (newPos.lat - start.lat()) * progress;
        const lng = start.lng() + (newPos.lng - start.lng()) * progress;
        driverMarker.setPosition({ lat, lng });
        requestAnimationFrame(smoothMove);
      } else {
        driverMarker.setPosition(newPos);
      }
    };
    smoothMove();

    // Check distance moved; redraw routes if >100 m
    const distance = haversineDistance(lastPos, newPos);
    if (distance > 0.1) { // km (≈100 m)
      lastPos = newPos;
      await drawRoutes(newPos);
    }
  });

  // 🔹 Haversine formula (distance between two coords in km)
  function haversineDistance(p1, p2) {
    const R = 6371; // km
    const dLat = ((p2.lat - p1.lat) * Math.PI) / 180;
    const dLng = ((p2.lng - p1.lng) * Math.PI) / 180;
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos((p1.lat * Math.PI) / 180) *
        Math.cos((p2.lat * Math.PI) / 180) *
        Math.sin(dLng / 2) ** 2;
    return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }
}

    // 🔸 Close map popup
    window.closeMapPopup = function () {
      const popup = document.getElementById("mapPopup");
      if (!popup) return;
      const data = popup._mapObjects;
      if (data) {
        if (data.markers) data.markers.forEach(m => m.setMap(null));
        if (data.renderers) data.renderers.forEach(r => r.setMap && r.setMap(null));
        popup._mapObjects = null;
      }
      popup.style.display = "none";
    };
  </script>

  <!-- Google Maps -->
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBb3cYzaeiSbLn2wO7vwvLBHLaErz6pBeo&callback=initMap"></script>
  <script>function initMap() {}</script>

  <!-- 💅 Modern Mobile-Friendly Styles -->
  <style>
    :root {
      --accent: #0078ff;
      --muted: #7b8aa3;
      --bg: #f4f7fb;
      --card-bg: #fff;
      --success: #2ea44f;
      --danger: #d73a49;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, Arial, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 15px;
      color: #1e293b;
    }

    h1 {
      color: #173a6c;
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-align: center;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 15px;
    }

    #searchInput {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #d0d6df;
      width: 100%;
      max-width: 320px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    #searchInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 4px var(--accent);
    }

    .tableWrap {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 650px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #eef2f7;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: var(--accent);
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    tr.onlineRow:hover { background: #ecfdf5; }
    tr.offlineRow:hover { background: #fef2f2; }

    .viewMapBtn, .deleteBtn {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: #fff;
      font-size: 14px;
      transition: 0.2s;
      margin: 3px 0;
    }

    .viewMapBtn { background: var(--success); }
    .deleteBtn { background: var(--danger); }

    .viewMapBtn:hover { background: #22b55b; }
    .deleteBtn:hover { background: #f05252; }

    #mapPopup {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      justify-content: center;
      align-items: center;
      z-index: 9999;
      backdrop-filter: blur(4px);
    }

    #mapBox {
      width: 90%;
      height: 80%;
      background: var(--card-bg);
      border-radius: 14px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      animation: fadeIn 0.3s ease;
    }

    #mapCanvas {
      width: 100%;
      height: 100%;
    }

    #closeMap {
      position: absolute;
      right: 14px;
      top: 14px;
      background: #ff5252;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      color: #fff;
      font-weight: bold;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--muted);
    }

    #driverCount {
      font-weight: 600;
      color: var(--accent);
    }

    button {
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover { background: #005ed1; }

    /* 🌍 Responsive */
    @media (max-width: 768px) {
      h1 { font-size: 1.25rem; }
      .tableWrap { padding: 6px; }
      th, td { padding: 8px; font-size: 13px; }
      #mapBox { width: 95%; height: 70%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>

<body>
  <h1>Admin — Drivers (with Directions)</h1>

  <div class="toolbar">
    <div class="meta">
      <input id="searchInput" placeholder="Search name, gmail or mobile" oninput="renderTable()" />
      <div>Total: <span id="driverCount">0</span></div>
    </div>
    <div>
      <button onclick="renderTable()">Refresh</button>
    </div>
  </div>

  <div class="tableWrap">
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Gmail</th><th>Mobile</th><th>Status</th><th>Bookings</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="driverTableBody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Map popup -->
  <div id="mapPopup" onclick="if(event.target===this) closeMapPopup()">
    <div id="mapBox">
      <button id="closeMap" onclick="closeMapPopup()">✖</button>
      <div id="mapCanvas"></div>
    </div>
  </div>
</body>
</html>
